# git-cliff 設定 — gitmoji + Conventional Commits からバージョン/CHANGELOG を生成。
# 規約は docs/commit-convention.md を参照。

[changelog]
header = """
# Changelog

入力デバイス設定（ZMK ファーム + skhd）のリリース履歴。\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
# Conventional の型で semver を判定（gitmoji は可読性・分類用）。
conventional_commits = true
# 非 Conventional（bot の :bento: 等）も走査対象に含め、parser で skip する。
filter_unconventional = false
protect_breaking_commits = true
topo_order = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*"

# 先頭 gitmoji を除去して Conventional パーサが型を読めるようにする。
# 1) :code: 形式  2) 絵文字グリフ（先頭の非 ASCII ラン）。
# 規約・commit-msg フック・commit-lint は :code: 形式のみ許可しグリフを弾くため
# 通常 2) は発火しない。これは hook/lint を通らない経路（過去履歴・bot・GitHub
# Web UI 編集など）でグリフ絵文字が混ざっても版算出を壊さないための防御。
# 規約と矛盾ではなく、規約の網をすり抜けた入力への保険として意図的に残す。
commit_preprocessors = [
  { pattern = '^:[\w-]+:\s*', replace = "" },
  { pattern = '^[^\x00-\x7F]+\s*', replace = "" },
]

commit_parsers = [
  # --- bot 自動コミットを除外（描画更新ごとの版上がり防止） ---
  { field = "author.name", pattern = "github-actions|web-flow|.*\\[bot\\]", skip = true },
  { field = "author.email", pattern = "actions@github|noreply@github", skip = true },

  # --- リリースに載せる型 ---
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^revert", group = "⏪ Revert" },

  # --- 版に影響させない型は changelog からも除外 ---
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^chore", skip = true },

  # 上記いずれにも該当しないものは除外（規約外メッセージを版に混ぜない）。
  { message = ".*", skip = true },
]

[bump]
# 初回（tag 0 件）の版。
initial_tag = "v0.1.0"
features_always_bump_minor = true
breaking_always_bump_major = true

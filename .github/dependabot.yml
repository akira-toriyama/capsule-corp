version: 2

# GitHub Actions の依存（actions/checkout, orhun/git-cliff-action 等）を定期更新。
# 注: 再利用ワークフロー zmkfirmware/zmk・caksoylar/keymap-drawer は @main 追従の
# ため Dependabot の版管理対象外（意図的に最新追従）。
# コミットは gitmoji + Conventional Commits 規約に合わせる（docs/commit-convention.md）。
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ":arrow_up: build(deps)"
    groups:
      actions:
        patterns: ["*"]

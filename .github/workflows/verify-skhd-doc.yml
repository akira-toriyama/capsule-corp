name: Verify skhd doc sync

# host/skhd/skhdrc.tmpl を単一ソースとし、host/skhd/README.md の
# ショートカット表がそこから生成された状態と一致するかを検証する。
on:
  push:
    paths:
      - host/skhd/skhdrc.tmpl
      - host/skhd/README.md
      - scripts/gen-skhd-doc.py
      - .github/workflows/verify-skhd-doc.yml
  pull_request:
    paths:
      - host/skhd/skhdrc.tmpl
      - host/skhd/README.md
      - scripts/gen-skhd-doc.py
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check skhd doc is in sync
        run: python3 scripts/gen-skhd-doc.py --check

name: ShellCheck

# shell スクリプト（Docker ビルド・skhd ブリッジ・git フック）を静的検査。
# shellcheck は GitHub Ubuntu runner に同梱のため追加依存なし。
on:
  push:
    paths:
      - "**/*.sh"
      - "**/*.bash"
      - "scripts/hooks/**"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**/*.sh"
      - "**/*.bash"
      - "scripts/hooks/**"
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          set -euo pipefail
          files=$(git ls-files '*.sh' '*.bash' 'scripts/hooks/*')
          echo "対象:"; echo "$files"
          # shebang からシェルを判定（commit-msg は #!/bin/sh）。
          shellcheck $files

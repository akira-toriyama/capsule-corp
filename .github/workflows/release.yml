name: Release

# main へ push（PR マージ）されると、コミット（gitmoji + Conventional
# Commits）から git-cliff が次版を算出し「ローリングドラフト」GitHub
# Release を作成／更新する。タグは作らない（GitHub がドラフト Publish 時に
# 生成）。同一次版のドラフトがあれば内容・成果物・target を上書き更新し、
# 別版の自動ドラフトがあれば破棄。よって main にマージするほど「次リリース
# 下書き」が育ち、未公開のうちはタグ・版が増殖しない。公開は手動
# （GitHub UI で内容確認のうえ Publish。publish 時に初めてタグ生成）。
# main 保護のため CHANGELOG は main へ push しない。
# workflow_dispatch + dry_run=true は版算出+ノート+ビルドのみ＝ドラフトを
# 作らず版も消費しない完全プレビュー。規約: docs/commit-convention.md
# 設定: cliff.toml
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "プレビューのみ（ドラフトを作らず artifact だけ）"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 次版は git-cliff を直接実行して算出する（git-cliff 公式推奨。
      # orhun/git-cliff-action の outputs.version は「最新リリース版」で
      # 次版ではないため使わない）。未公開ドラフトはタグを作らないので
      # last タグは最後に Publish した版のまま＝次版はマージしても安定。
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          next="$(git-cliff --config cliff.toml --bumped-version | tr -d '[:space:]')"
          last="$(git tag --sort=-v:refname | head -n1)"
          echo "next=$next last=${last:-<none>}"
          if [ -z "$next" ] || [ "$next" = "$last" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::リリース対象の変更（feat/fix/perf/breaking）が無いため何もしません。"
          else
            echo "release=true"   >> "$GITHUB_OUTPUT"
            echo "version=$next"  >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.ver.outputs.release == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git-cliff --config cliff.toml --unreleased --tag "$VERSION" --strip all > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Initial release." > RELEASE_NOTES.md; fi

      - name: Build firmware (ZMK / west, Docker)
        if: steps.ver.outputs.release == 'true'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/w" -w /w -e ZEPHYR_BASE=/w/zephyr \
            zmkfirmware/zmk-build-arm:stable bash -ceu '
              git config --global --add safe.directory "*"
              west init -l config
              west update
              west zephyr-export
              mkdir -p artifacts
              for SH in imprint_left imprint_right; do
                west build -p -s zmk/app -d "build/$SH" -b assimilator-bt -- \
                  -DSHIELD="$SH" -DZMK_CONFIG=/w/config
                cp "build/$SH/zephyr/zmk.uf2" "artifacts/$SH.uf2"
              done
            '

      # dry_run（workflow_dispatch のみ）: ドラフトを作らず、ビルド成果物と
      # ノートを artifact として上げる（版を消費しない＝完全プレビュー）。
      - name: Upload preview (dry run)
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-preview-${{ steps.ver.outputs.version }}
          path: |
            artifacts/imprint_left.uf2
            artifacts/imprint_right.uf2
            RELEASE_NOTES.md

      - name: Dry-run summary
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          {
            echo "## Dry run: ${VERSION}（ドラフトは未作成）"
            echo
            echo '```'
            cat RELEASE_NOTES.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # 通常実行（push:main / 手動 dry_run でない）: ローリングドラフトを
      # 作成または更新。タグは作らない（GitHub が Publish 時に target の
      # コミットへタグ生成）。同一版のドラフトは上書き、別版の自動ドラフトは
      # 破棄して常に1本に保つ。公開済み Release には一切触れない。
      - name: Create or update rolling DRAFT release
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          assets="artifacts/imprint_left.uf2 artifacts/imprint_right.uf2"

          # 既存の「自動ドラフト」（未公開・semver タグ）を列挙。
          # 公開済み（isDraft=false）は対象外＝絶対に触れない。
          mapfile -t drafts < <(gh release list --limit 100 \
            --json tagName,isDraft \
            --jq '.[] | select(.isDraft==true and (.tagName|test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))) | .tagName')

          have_current=0
          for t in "${drafts[@]:-}"; do
            [ -z "$t" ] && continue
            if [ "$t" = "$VERSION" ]; then
              have_current=1
            else
              # 別版の旧自動ドラフトは破棄（superseded）。
              # 念のため旧方式で push 済みタグがあれば併せて除去。
              echo "::notice::旧自動ドラフト $t を破棄（→ $VERSION に統合）"
              gh release delete "$t" --yes
              git push origin ":refs/tags/$t" 2>/dev/null || true
            fi
          done

          if [ "$have_current" -eq 1 ]; then
            # shellcheck disable=SC2086
            gh release upload "$VERSION" $assets --clobber
            gh release edit "$VERSION" --draft \
              --title "$VERSION" --notes-file RELEASE_NOTES.md --target "$SHA"
            url="$(gh release view "$VERSION" --json url --jq .url)"
            action="更新"
          else
            # shellcheck disable=SC2086
            url="$(gh release create "$VERSION" --draft --target "$SHA" \
              --title "$VERSION" --notes-file RELEASE_NOTES.md $assets)"
            action="作成"
          fi

          echo "::notice::ドラフト Release を${action}（未公開・タグ未生成）。内容確認のうえ手動 Publish: ${url}"
          {
            echo "## Draft Release ${VERSION} を${action}（未公開）"
            echo
            echo "main にマージするほどこの下書きが育ちます。"
            echo "内容を確認のうえ手動で Publish（その時点でタグ生成）: ${url}"
          } >> "$GITHUB_STEP_SUMMARY"

name: Release

# 手動起動。コミット（gitmoji + Conventional Commits）から git-cliff が次版を
# 算出し、タグ + GitHub Release（git-cliff 生成ノート + imprint_*.uf2 添付）を
# 作る。main 保護ルールを尊重するため CHANGELOG を main へ push しない
# （タグ refs/tags/* は branch ルール対象外）。
# dry_run=true は「版算出 + ノート + ビルド」まで行い artifact を上げるだけ。
# タグ/Release を作らず版も消費しない＝完全プレビュー。
# 規約: docs/commit-convention.md / 設定: cliff.toml
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "プレビューのみ（タグ/Release を作らず artifact だけ）"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 次版は git-cliff を直接実行して算出する（git-cliff 公式推奨。
      # orhun/git-cliff-action の outputs.version は「最新リリース版」で
      # 次版ではないため使わない）。
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          next="$(git-cliff --config cliff.toml --bumped-version | tr -d '[:space:]')"
          last="$(git tag --sort=-v:refname | head -n1)"
          echo "next=$next last=${last:-<none>}"
          if [ -z "$next" ] || [ "$next" = "$last" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::リリース対象の変更（feat/fix/perf/breaking）が無いため何もしません。"
          else
            echo "release=true"   >> "$GITHUB_OUTPUT"
            echo "version=$next"  >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.ver.outputs.release == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git-cliff --config cliff.toml --unreleased --tag "$VERSION" --strip all > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Initial release." > RELEASE_NOTES.md; fi

      - name: Build firmware (ZMK / west, Docker)
        if: steps.ver.outputs.release == 'true'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/w" -w /w -e ZEPHYR_BASE=/w/zephyr \
            zmkfirmware/zmk-build-arm:stable bash -ceu '
              git config --global --add safe.directory "*"
              west init -l config
              west update
              west zephyr-export
              mkdir -p artifacts
              for SH in imprint_left imprint_right; do
                west build -p -s zmk/app -d "build/$SH" -b assimilator-bt -- \
                  -DSHIELD="$SH" -DZMK_CONFIG=/w/config
                cp "build/$SH/zephyr/zmk.uf2" "artifacts/$SH.uf2"
              done
            '

      # dry_run: タグ/Release を作らず、ビルド成果物とノートを artifact として
      # 上げる（版を消費しない＝完全プレビュー）。
      - name: Upload preview (dry run)
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-preview-${{ steps.ver.outputs.version }}
          path: |
            artifacts/imprint_left.uf2
            artifacts/imprint_right.uf2
            RELEASE_NOTES.md

      - name: Dry-run summary
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          {
            echo "## Dry run: ${VERSION}（タグ/Release は未作成）"
            echo
            echo '```'
            cat RELEASE_NOTES.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # 通常実行（dry_run でない）: タグ作成 + GitHub Release。
      # タグ push は branch ルール対象外なので保護を弱めずに動作する。
      - name: Create tag and GitHub Release
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md \
            artifacts/imprint_left.uf2 artifacts/imprint_right.uf2

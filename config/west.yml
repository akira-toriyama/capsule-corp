manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: Cyboard-DigitalTailor
      url-base: https://github.com/Cyboard-DigitalTailor
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
  projects:
    # ZMK は main 追従が必須。Cyboard zmk-keyboards@main の assimilator-bt は
    # 新しい Zephyr ハードウェアモデル(HWv2)を要求し、ZMK をタグ固定すると
    # arch.cmake で "Could not find ARCH=cyboard" となり board 解決に失敗する。
    # （ZMK 公式のバージョン固定推奨より、この依存関係を優先する）
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    # zmk-keyboards (Cyboard モジュール) は main 追従（タグ運用なし）。
    - name: zmk-keyboards
      remote: Cyboard-DigitalTailor
      revision: main
      import: config/west.yml
  self:
    path: config
